# Test profile: in-memory DB so `mvn clean install` does not require MySQL
spring.datasource.url=jdbc:h2:mem:smart_expense_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.jwt.secret=SmartExpenseSecretKeyForJWTTokenGenerationMinimum32Chars
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
