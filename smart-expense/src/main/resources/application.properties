spring.application.name=smart-expense
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_expense_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
# MySQL username
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# MySQL password
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
server.port=${PORT:8080}

app.jwt.secret=${APP_JWT_SECRET:SmartExpenseSecretKeyForJWTTokenGenerationMinimum32Chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

spring.websocket.enabled=true
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
